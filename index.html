<!DOCTYPE html>
<html>
<head>
    <title> Losers- Stories That Inspire </title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">  
<div class="sidebar">   
<div id="navbar">
 
</div>
    <div class="menu">

 <div class="menu-item active">🏠 Home</div>

  <div class="menu-item">🔥 Trending</div>

 

  <div class="menu-item">🏆 Leaderboard</div>

 
</div>
   

<hr>
</div>

<div class="feed">
    <div class="topbar">

  <input type="text"
         class="search-box"
         placeholder="🔍 Search blogs, people ...">

  <div class="top-right">

   <button class="write-btn" id="writeBlogBtn">
      + Write Blog
    </button>
</div>

  </div>

</div>
<div id="main-content">
  <div id="posts"></div>
</div>
</div>

<div class="rightbar">

  <div class="widget">
    <h3>🎵 Mood Player</h3>
    <p>Relax • Focus • Motivation</p>
  </div>

  <div class="widget">
    <h3>😂 Meme of the Day</h3>
    <p>Daily fresh memes coming soon...</p>
  </div>

  <div class="widget">
    <h3>🔥 Writing Streak</h3>
    <p>7 Days</p>
  </div>

  <div class="widget">
    <h3>🏆 Top Writers</h3>
    <p>1. Sagar</p>
    <p>2. Aman</p>
    <p>3. Guest</p>
  </div>


  </div>

</div>
</div>

</div> 
    <div id="authModal" class="modal">

  <div class="modal-content">
<span id="closeModal" class="close-btn">×</span>
    <h2 id="authTitle">
      Welcome to Sagar Social
    </h2>


   <div id="loginForm">

  <input
    type="email"
    id="email"
    placeholder="Email">

  <input
    type="password"
    id="password"
    placeholder="Password">

  <button id="loginBtn">
    Login
  </button>

  <button id="signupBtn">
    Create Account
  </button>

  <p id="switchText">
    New user? Create Account
  </p>

  <p id="msg"></p>
       </div>
<div id="signupForm" style="display:none;">

  <h2>Create Account</h2>

  <input type="text" id="name" placeholder="Full Name">

  <input type="text" id="username" placeholder="Choose Username">

  <input type="email" id="newEmail" placeholder="Email">

  <input type="password" id="newPassword" placeholder="Password">

  <button id="createAccount">
    Create Account
  </button>

  <button id="backToLogin">
    ← Back to Login
  </button>

</div>
</div>


  </div>

 
<script type="module" src="js/script.js"></script>
</body>
</html>
