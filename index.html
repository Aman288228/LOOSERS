<!DOCTYPE html>
<html>

<body>

    <h1>KYA HI BOLU MAI AAGE PADHO BAHUT INTERESTING HAI</h1>

    <h2>YE MAI BAD ME BATAUNGA ABHI RUKO</h2>
    <p>Ye meri personal blog website hai.</p>

    <hr>

    <h2>Meri Pehli Post</h2>
    <p>Aaj maine apni pehli website banayi.</p>

<hr>

<h2>Account</h2>
    <hr>

<h2>Create Blog Post</h2>

<input type="text" id="title" placeholder="Blog Title">
<br><br>

<textarea id="content" placeholder="Write your blog..." rows="5" cols="40"></textarea>
<br><br>

<button id="postBtn">Publish Post</button>
    <hr>

<h2>All Blogs</h2>

<div id="posts"></div>

<p id="postMsg"></p>

<input type="email" id="email" placeholder="Email">
<br><br>

<input type="password" id="password" placeholder="Password">
<br><br>

<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>

<p id="msg"></p>
<script type="module" src="script.js"></script>
</body>
