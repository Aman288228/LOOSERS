<!DOCTYPE html>

<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

 <div class="menu-item active">🏠 Home</div>

</div>
   

<hr>

<div class="feed">
    <div class="topbar">

  <input type="text"
         class="search-box"
         placeholder="🔍 Search blogs, people ...">

  <div class="top-right">

   <button class="write-btn" id="writeBlogBtn">
      + Write Blog
    </button>
</div>

  </div>

<div id="main-content">

<div class="rightbar">

  </div>

  </div>

    <h3>🏆 Top Writers</h3>
    <p>1. Sagar</p>

  </div>


  </div>

</div>
</div>

</div> 
    <div id="authModal" class="modal">

  <div class="modal-content">
<span id="closeModal" class="close-btn">×</span>
    <h2 id="authTitle">
      Welcome to Sagar Social
    </h2>


    <input 
    type="email"
    id="email"
    placeholder="Email">


    <input 
    type="password"
    id="password"
    placeholder="Password">


    <button id="loginBtn">
      Login
    </button>


    <button id="signupBtn">
      Create Account
    </button>


    <p id="switchText">
      New user? Create Account
    </p>


    <p id="msg"></p>


  </div>

</div>
<script type="module" src="js/script.js"></script>
