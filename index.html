<!DOCTYPE html>
<html>
<head>
    <title> Losers- Stories That Inspire </title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">  
<div class="sidebar">   
<div id="navbar">
 
</div>
    <div class="menu">

 <div class="menu-item active">🏠 Home</div>

  <div class="menu-item">🔥 Trending</div>

  <div class="menu-item">🎵 Music Lounge</div>

  <div class="menu-item">🏆 Leaderboard</div>

  <div class="menu-item">⚙️ Settings</div>

</div>
   

<hr>
</div>

<div class="feed">
    <div class="topbar">

  <input type="text"
         class="search-box"
         placeholder="🔍 Search blogs, people ...">

  <div class="top-right">

    <button class="write-btn">
      + Write Blog
    </button>

    <div class="icon">🎵</div>

    <div class="icon">🔔</div>

    <div class="profile">
      👦 Aman 😎
    </div>

  </div>

</div>
<h2>Account</h2>
    <hr>

<h2>Create Blog Post</h2>

<input type="text" id="title" placeholder="Blog Title">
<br><br>

<textarea id="content" placeholder="Write your blog..." rows="5" cols="40"></textarea>
<br><br>

<button id="postBtn">Publish Post</button>
    <hr>

<h2>All Blogs</h2>

<div id="posts"></div>

<p id="postMsg"></p>

<input type="email" id="email" placeholder="Email">
<br><br>

<input type="password" id="password" placeholder="Password">
<br><br>

<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<p id="msg"></p>
</div>

<div class="rightbar">

  <div class="widget">
    <h3>🎵 Mood Player</h3>
    <p>Relax • Focus • Motivation</p>
  </div>

  <div class="widget">
    <h3>😂 Meme of the Day</h3>
    <p>Daily fresh memes coming soon...</p>
  </div>

  <div class="widget">
    <h3>🔥 Writing Streak</h3>
    <p>7 Days</p>
  </div>

  <div class="widget">
    <h3>🏆 Top Writers</h3>
    <p>1. Sagar</p>
    <p>2. Aman</p>
    <p>3. Guest</p>
  </div>

</div>

</div>    
<script type="module" src="script.js"></script>
</body>
</html>
